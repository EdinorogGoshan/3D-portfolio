        /* ========== СТИЛИ ГЛАВНОЙ СТРАНИЦЫ ========== */
        
/* ========== СТИЛИ ГЛАВНОЙ СТРАНИЦЫ ========== */

/* Hero секция */
.hero-wrapper {
    padding: 0 68px;
    margin: 108px 0 0;
    height: auto;
    min-height: auto;
}

.hero-3d {
    width: 100%;
    height: 78vh;
    min-height: 500px;
    max-height: 1000px;
    background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.hero-3d::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(82, 72, 156, 0.2), transparent);
    animation: pulse 4s ease-in-out infinite;
    z-index: 1;
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
}

.hero-content {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 20px;
    width: 100%;
}

.hero-content h1 {
    font-size: clamp(28px, 5vw, 64px);
    margin-top: 10%;
    margin-bottom: 256px;
    font-family: 'Neutral Face', sans-serif;
}

.hero-content .btn {
    background: #52489C;
    border: none;
    border-radius: 72px;
    padding: 16px 40px;
    color: #F4F4F4;
    font-size: clamp(16px, 3vw, 24px);
    font-weight: 500;
    transition: transform 0.3s ease;
    cursor: pointer;
    margin-top: 72px;
}

.hero-content .btn:hover {
    transform: scale(1.05);
}

/* Адаптив для мобильных устройств */
@media (max-width: 768px) {
    .hero-wrapper {
        padding: 0 20px;
        margin: 80px 0 0;
    }
    
    .hero-3d {
        height: 60vh;
        min-height: 450px;
        max-height: 550px;
        border-radius: 12px;
    }
    
    .hero-content h1 {
        margin-bottom: 120px;
        font-size: clamp(24px, 6vw, 40px);
    }
    
    .hero-content .btn {
        padding: 14px 32px;
        border-radius: 60px;
        font-size: clamp(14px, 4vw, 18px);
    }
}

@media (max-width: 480px) {
    .hero-wrapper {
        padding: 0 16px;
        margin: 70px 0 0;
    }
    
    .hero-3d {
        height: 50vh;
        min-height: 400px;
        max-height: 500px;
        border-radius: 10px;
    }
    
    .hero-content h1 {
        margin-bottom: 80px;
        font-size: clamp(20px, 7vw, 32px);
    }
    
    .hero-content .btn {
        padding: 12px 28px;
        border-radius: 50px;
        font-size: clamp(12px, 4vw, 16px);
    }
}

        /* Секция проектов */
        .projects {
            margin: 160px 0 0;
            padding: 0 68px;
        }

        .projects .grid-container {
            max-width: calc(168px * 12 + 24px * 11);
            margin: 0 auto;
        }

        .projects .grid-container h2 {
            font-size: clamp(28px, 5vw, 64px);
            font-family: 'Neutral Face', sans-serif;
            margin-bottom: 80px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .project-card {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1128 / 576;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .project-title {
            font-size: clamp(20px, 4vw, 48px);
            font-family: 'Neutral Face', sans-serif;
            color: #F4F4F4;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            text-align: center;
            padding: 20px;
        }

        .project-card:hover img {
            transform: scale(1.1);
        }

        .project-card:hover .project-overlay {
            background: rgba(0, 0, 0, 0.7);
        }

        .project-card:hover .project-title {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

        const projectsGrid = document.getElementById('projectsGrid');
        if (projectsGrid) {
            projects.forEach((project) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <img src="${project.image}" alt="${project.title}">
                    <div class="project-overlay">

                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = project.link;
                });
                projectsGrid.appendChild(card);
            });
        }
